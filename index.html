<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>DBK Rørbæring — 300x250</title>
<style>
  html, body {
    margin: 0; padding: 0;
    width: 300px; height: 250px;
    overflow: hidden;
    font-family: Arial, Helvetica, sans-serif;
    background: #0d1b2a;
  }

  .banner {
    position: relative;
    width: 300px; height: 250px;
    display: block;
    text-decoration: none;
    overflow: hidden;
    cursor: pointer;
  }

  .bgvideo {
    position: absolute;
    top: 50%; left: 50%;
    min-width: 100%; min-height: 100%;
    width: auto; height: auto;
    transform: translate(-50%, -50%);
    object-fit: cover;
  }

  .shade {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: linear-gradient(
      to bottom,
      rgba(13,27,42,0.15) 0%,
      rgba(13,27,42,0.05) 40%,
      rgba(13,27,42,0.85) 100%
    );
  }

  .content {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    padding: 14px 16px 16px;
  }

  .eyebrow {
    font-size: 10px;
    font-weight: bold;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #ffffff;
    opacity: 0;
    animation: fadeUp 0.7s ease forwards;
    animation-delay: 0.3s;
    margin-bottom: 4px;
  }

  .headline {
    font-size: 17px;
    font-weight: bold;
    color: #ffffff;
    line-height: 1.25;
    opacity: 0;
    animation: fadeUp 0.7s ease forwards;
    animation-delay: 0.6s;
    margin-bottom: 10px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .cta-btn {
    display: inline-block;
    background: #e30613;
    color: #fff;
    font-size: 12px;
    font-weight: bold;
    padding: 8px 16px;
    border-radius: 4px;
    opacity: 0;
    animation: fadeUp 0.7s ease forwards, ctaPulse 2.6s ease-in-out infinite;
    animation-delay: 0.9s, 2s;
  }

  @keyframes ctaPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(227,6,19,0.5); }
    50%      { box-shadow: 0 0 0 7px rgba(227,6,19,0); }
  }

  .logo-tag {
    position: absolute;
    top: 12px; left: 14px;
    background: rgba(255,255,255,0.92);
    padding: 5px 10px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }
  .logo-tag img {
    display: block;
    height: 16px;
    width: auto;
  }
</style>
</head>
<body>

<!--
  DESTINATION URL: sæt her. Hvis bansys/Adform indsætter en clickTag-variabel
  (fx via URL-parameter ?clickTag=...), bruges den automatisk i stedet —
  det er sådan de fleste ad-servere sporer klik korrekt.
-->
<a id="bannerLink" class="banner" href="https://www.dbk-aps.com/da/produkter/rorbaering" target="_blank" rel="noopener">
  <video class="bgvideo" autoplay muted loop playsinline>
    <source src="scroll.mp4" type="video/mp4">
  </video>
  <div class="shade"></div>
  <div class="logo-tag"><img src="logo.svg" alt="DBK"></div>
  <div class="content">
    <div class="eyebrow">Rørbæring i praksis</div>
    <div class="headline">50% besparelse på<br>installationsomkostninger</div>
    <span class="cta-btn">Se løsningen →</span>
  </div>
</a>

<script>
  // Ad-server clickTag support: hvis bansys sætter en clickTag-parameter
  // i URL'en til dette banner, bruges den som destination i stedet for
  // den hardkodede href ovenfor. Det er standardmåden ad-servere sporer klik på.
  (function () {
    var params = new URLSearchParams(window.location.search);
    var clickTag = params.get('clickTag') || params.get('clicktag') || window.clickTag;
    if (clickTag) {
      document.getElementById('bannerLink').setAttribute('href', clickTag);
    }
  })();
</script>

</body>
</html>
